<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vibe Coding 基础交互式学习资料</title>
  <style>
    :root {
      --paper: #f8f6f0;
      --surface: #ffffff;
      --ink: #17212b;
      --muted: #65717f;
      --line: #d9ded8;
      --blue: #2563eb;
      --green: #178760;
      --amber: #b76114;
      --rose: #be3455;
      --teal: #0f766e;
      --focus: #111827;
      --shadow: 0 18px 44px rgba(30, 41, 59, 0.12);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(255,255,255,0.72), rgba(255,255,255,0)),
        var(--paper);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      line-height: 1.55;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
    }

    .app {
      display: grid;
      grid-template-columns: minmax(260px, 330px) minmax(0, 1fr);
      min-height: 100vh;
    }

    .sidebar {
      position: sticky;
      top: 0;
      align-self: start;
      height: 100vh;
      overflow: auto;
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.74);
      backdrop-filter: blur(14px);
      padding: 22px;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
      margin-bottom: 20px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      background: var(--ink);
      color: white;
      font-weight: 800;
      letter-spacing: 0;
    }

    h1,
    h2,
    h3,
    p {
      margin-top: 0;
    }

    h1 {
      font-size: 22px;
      line-height: 1.2;
      margin-bottom: 4px;
    }

    h2 {
      font-size: clamp(26px, 4vw, 44px);
      line-height: 1.08;
      letter-spacing: 0;
      margin-bottom: 12px;
    }

    h3 {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .muted {
      color: var(--muted);
    }

    .small {
      font-size: 13px;
    }

    .progress-wrap {
      margin: 16px 0 18px;
    }

    .progress-line {
      height: 10px;
      border: 1px solid var(--line);
      border-radius: 999px;
      overflow: hidden;
      background: #edf0ec;
    }

    .progress-bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--green), var(--blue));
      transition: width 180ms ease;
    }

    .nav-list {
      display: grid;
      gap: 8px;
      margin-top: 14px;
    }

    .lesson-link {
      width: 100%;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: var(--ink);
      padding: 10px 11px;
      text-align: left;
      display: grid;
      grid-template-columns: 26px minmax(0, 1fr) auto;
      gap: 8px;
      align-items: center;
    }

    .lesson-link:hover {
      background: #f1f5f2;
    }

    .lesson-link.active {
      background: var(--surface);
      border-color: #b8c5d4;
      box-shadow: 0 8px 20px rgba(30, 41, 59, 0.08);
    }

    .lesson-link.done .index-dot {
      background: var(--green);
      color: white;
    }

    .index-dot {
      width: 26px;
      height: 26px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: #e6ebe6;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .lesson-title-short {
      min-width: 0;
      font-weight: 700;
      line-height: 1.25;
    }

    .lesson-status {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .main {
      min-width: 0;
      padding: 28px clamp(18px, 4vw, 54px) 44px;
    }

    .top-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }

    .ghost-button,
    .primary-button,
    .icon-button,
    .tab-button,
    .choice-button {
      border-radius: var(--radius);
      border: 1px solid var(--line);
      min-height: 40px;
      padding: 9px 13px;
      background: var(--surface);
      color: var(--ink);
      transition: transform 120ms ease, box-shadow 120ms ease, border-color 120ms ease;
    }

    .ghost-button:hover,
    .primary-button:hover,
    .icon-button:hover,
    .tab-button:hover,
    .choice-button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(30, 41, 59, 0.1);
    }

    .primary-button {
      background: var(--ink);
      border-color: var(--ink);
      color: white;
      font-weight: 800;
    }

    .primary-button:disabled,
    .ghost-button:disabled {
      opacity: 0.48;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .lesson-head {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(260px, 0.7fr);
      gap: 26px;
      align-items: stretch;
      margin-bottom: 22px;
    }

    .intro-panel,
    .map-panel,
    .content-panel,
    .practice-panel,
    .quiz-panel,
    .source-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.86);
      box-shadow: var(--shadow);
    }

    .intro-panel {
      padding: clamp(20px, 4vw, 34px);
      min-height: 310px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    .map-panel {
      padding: 18px;
      display: grid;
      grid-template-rows: auto minmax(160px, 1fr) auto;
      gap: 12px;
      min-height: 310px;
    }

    .map-panel canvas {
      width: 100%;
      height: 230px;
      display: block;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fbfcfb;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 14px 0;
    }

    .pill {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      background: #f7faf7;
      color: #354250;
      font-size: 13px;
      font-weight: 700;
    }

    .tabs {
      position: sticky;
      top: 0;
      z-index: 4;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      padding: 10px;
      margin-bottom: 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(248, 246, 240, 0.92);
      backdrop-filter: blur(12px);
    }

    .tab-button {
      box-shadow: none;
      min-height: 38px;
      padding: 8px 12px;
      font-weight: 800;
    }

    .tab-button.active {
      background: var(--ink);
      border-color: var(--ink);
      color: white;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 14px;
    }

    .content-panel,
    .practice-panel,
    .quiz-panel,
    .source-panel {
      padding: clamp(16px, 3vw, 24px);
    }

    .concept-list {
      display: grid;
      gap: 12px;
      padding: 0;
      margin: 0;
      list-style: none;
    }

    .concept-list li {
      border-left: 4px solid var(--blue);
      padding: 12px 14px;
      background: #f8fbff;
      border-radius: 0 var(--radius) var(--radius) 0;
    }

    .concept-list li:nth-child(2n) {
      border-left-color: var(--green);
      background: #f4fbf7;
    }

    .concept-list li:nth-child(3n) {
      border-left-color: var(--amber);
      background: #fff8f1;
    }

    .code-block {
      margin: 12px 0;
      border: 1px solid #253140;
      border-radius: var(--radius);
      background: #101820;
      color: #eef7ff;
      overflow: auto;
      box-shadow: 0 16px 34px rgba(16, 24, 32, 0.16);
    }

    pre {
      margin: 0;
      padding: 16px;
      font-size: 14px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      overflow-wrap: anywhere;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
    }

    .output {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 12px;
      background: #f3f6f3;
      min-height: 48px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .practice-control {
      display: grid;
      gap: 12px;
      margin-top: 12px;
    }

    label {
      font-weight: 800;
    }

    input,
    textarea,
    select {
      width: 100%;
      border: 1px solid #b9c2ba;
      border-radius: var(--radius);
      padding: 11px 12px;
      background: white;
      color: var(--ink);
    }

    textarea {
      min-height: 130px;
      resize: vertical;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      line-height: 1.55;
    }

    input:focus,
    textarea:focus,
    select:focus,
    button:focus-visible {
      outline: 3px solid rgba(37, 99, 235, 0.22);
      outline-offset: 2px;
      border-color: var(--blue);
    }

    .feedback {
      min-height: 24px;
      font-weight: 800;
    }

    .feedback.good {
      color: var(--green);
    }

    .feedback.bad {
      color: var(--rose);
    }

    .scenario-list {
      display: grid;
      gap: 10px;
    }

    .scenario-item,
    .quiz-question,
    .table-preview,
    .env-preview,
    .api-preview,
    .step-item,
    .prompt-box {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px;
      background: #fbfcfb;
    }

    .scenario-actions,
    .choice-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .choice-button.selected {
      background: var(--blue);
      color: white;
      border-color: var(--blue);
    }

    .choice-button.correct {
      background: var(--green);
      color: white;
      border-color: var(--green);
    }

    .choice-button.wrong {
      background: var(--rose);
      color: white;
      border-color: var(--rose);
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 12px;
      font-size: 14px;
    }

    .data-table th,
    .data-table td {
      border: 1px solid var(--line);
      padding: 9px;
      text-align: left;
      vertical-align: top;
    }

    .data-table th {
      background: #edf2ef;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .two-col {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .quiz-list {
      display: grid;
      gap: 12px;
    }

    .quiz-options {
      display: grid;
      gap: 8px;
      margin-top: 10px;
    }

    .quiz-option {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      gap: 8px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 10px;
      background: white;
      font-weight: 600;
    }

    .quiz-option input {
      width: auto;
      margin-top: 4px;
    }

    .copy-area {
      position: relative;
    }

    .prompt-box {
      white-space: pre-wrap;
      word-break: break-word;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      background: #101820;
      color: #eef7ff;
    }

    .source-list {
      display: grid;
      gap: 8px;
      padding-left: 18px;
    }

    .source-list a {
      color: var(--blue);
      font-weight: 800;
      text-decoration-thickness: 2px;
      text-underline-offset: 3px;
    }

    .toast {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      border: 1px solid #0d513b;
      border-radius: var(--radius);
      padding: 12px 14px;
      background: #effaf3;
      color: #0d513b;
      font-weight: 800;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transform: translateY(8px);
      transition: opacity 140ms ease, transform 140ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 960px) {
      .app {
        grid-template-columns: 1fr;
      }

      .sidebar {
        position: relative;
        height: auto;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .lesson-head {
        grid-template-columns: 1fr;
      }

      .form-grid,
      .two-col {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 560px) {
      .main {
        padding-inline: 14px;
      }

      .tabs {
        position: static;
      }

      .tab-button,
      .ghost-button,
      .primary-button,
      .choice-button {
        width: 100%;
      }

      .button-row,
      .scenario-actions,
      .choice-grid {
        align-items: stretch;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar" aria-label="课程目录">
      <div class="brand">
        <div class="brand-mark">VC</div>
        <div>
          <h1>Vibe Coding 基础课</h1>
          <p class="muted small">边点边学的项目生成入门资料</p>
        </div>
      </div>
      <div class="progress-wrap" aria-label="整体进度">
        <div class="button-row" style="justify-content: space-between; margin-bottom: 8px;">
          <strong>学习进度</strong>
          <span id="overallText" class="muted small">0%</span>
        </div>
        <div class="progress-line"><div id="overallBar" class="progress-bar"></div></div>
      </div>
      <div class="button-row">
        <button id="resetProgress" class="ghost-button" type="button">重置进度</button>
      </div>
      <nav id="lessonNav" class="nav-list"></nav>
    </aside>

    <main class="main">
      <div class="top-actions">
        <p class="muted" id="breadcrumb">第 1 课</p>
        <div class="button-row">
          <button id="prevLesson" class="ghost-button" type="button">上一课</button>
          <button id="nextLesson" class="primary-button" type="button">下一课</button>
        </div>
      </div>

      <section class="lesson-head" aria-labelledby="lessonTitle">
        <div class="intro-panel">
          <div>
            <h2 id="lessonTitle"></h2>
            <p id="lessonGoal" class="muted"></p>
            <div id="lessonTags" class="pill-row"></div>
          </div>
          <div class="button-row">
            <button id="markLesson" class="primary-button" type="button">标记本课完成</button>
            <button id="copyPromptTop" class="ghost-button" type="button">复制本课提示词</button>
          </div>
        </div>
        <div class="map-panel">
          <div>
            <h3>知识地图</h3>
            <p class="muted small">节点越深，代表你越接近完整项目生成流程。</p>
          </div>
          <canvas id="mapCanvas" width="520" height="300" aria-label="课程知识地图"></canvas>
          <p id="mapCaption" class="muted small"></p>
        </div>
      </section>

      <div class="tabs" role="tablist" aria-label="学习区域">
        <button class="tab-button active" data-tab="concept" type="button">概念</button>
        <button class="tab-button" data-tab="example" type="button">例子</button>
        <button class="tab-button" data-tab="practice" type="button">练习</button>
        <button class="tab-button" data-tab="quiz" type="button">小测验</button>
        <button class="tab-button" data-tab="prompt" type="button">提示词</button>
        <button class="tab-button" data-tab="sources" type="button">资料源</button>
      </div>

      <section id="tabContent" class="content-grid" aria-live="polite"></section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    const lessons = [
      {
        id: "variables",
        title: "变量：给数据起名字",
        shortTitle: "变量",
        goal: "学会把用户输入、配置、接口返回值保存起来，之后交给函数、页面或数据库继续使用。",
        tags: ["const", "let", "字符串", "数字", "布尔值"],
        concepts: [
          "变量像一个有名字的盒子。你把值放进去，后面就可以通过名字拿出来。",
          "优先使用 const，表示这个名字不会重新指向另一个值；确实需要改变时再用 let。",
          "常见值类型包括字符串、数字、布尔值、数组、对象、null 和 undefined。",
          "vibe coding 时，变量名要尽量贴近业务，比如 habitName、dailyGoal、currentUser，比 x、data1 更好。"
        ],
        code: `const habitName = "Read";
let streakDays = 3;
const isCompletedToday = false;

streakDays = streakDays + 1;

console.log(habitName);
console.log(streakDays);
console.log(isCompletedToday);`,
        output: "Read\n4\nfalse",
        practice: {
          type: "fill",
          title: "补全变量名",
          question: "你正在做习惯打卡项目。下面这个值表示“今天是否已经打卡”，请写一个清晰的英文变量名。",
          placeholder: "例如 isSomething",
          accepted: ["isCompletedToday", "hasCheckedInToday", "didCheckInToday"],
          hint: "布尔值通常用 is、has、can、should 这类开头。"
        },
        quiz: [
          {
            q: "什么时候更适合用 const？",
            options: ["变量名不会重新指向另一个值时", "只要值是字符串时", "只要代码在函数外面时"],
            answer: 0
          },
          {
            q: "下面哪个变量名更适合保存用户邮箱？",
            options: ["x", "userEmail", "thing"],
            answer: 1
          }
        ],
        prompt: "请帮我检查当前项目里的变量命名，重点看它们是否表达了真实业务含义。请只指出会影响可读性或后续维护的命名，并给出替代名称。"
      },
      {
        id: "functions",
        title: "函数：把动作封装起来",
        shortTitle: "函数",
        goal: "学会把重复动作、计算逻辑和业务规则包装成可复用的小单元。",
        tags: ["function", "参数", "返回值", "复用"],
        concepts: [
          "函数是一段有名字的流程。它可以接收输入，也可以返回结果。",
          "参数是函数需要的信息；返回值是函数处理后交出来的结果。",
          "好函数通常只做一件清楚的事，比如 calculateStreak、formatDate、createHabit。",
          "让 AI 写代码时，可以要求它把复杂逻辑拆成小函数，这样更容易调试和测试。"
        ],
        code: `function calculateNextStreak(isCompletedToday, currentStreak) {
  if (isCompletedToday) {
    return currentStreak + 1;
  }

  return currentStreak;
}

const nextStreak = calculateNextStreak(true, 6);
console.log(nextStreak);`,
        output: "7",
        practice: {
          type: "fill",
          title: "补全函数名",
          question: "这个函数会根据价格和折扣计算最终价格。请写一个清晰的函数名。",
          placeholder: "例如 verb + noun",
          accepted: ["calculateFinalPrice", "getDiscountedPrice", "calculateDiscountedPrice"],
          hint: "函数名通常像动作：calculate、get、create、update、delete。"
        },
        quiz: [
          {
            q: "函数参数的作用是什么？",
            options: ["给函数传入它需要的信息", "自动把项目部署上线", "只能保存字符串"],
            answer: 0
          },
          {
            q: "下面哪个函数更容易维护？",
            options: ["doEverything()", "calculateStreak()", "handleStuff()"],
            answer: 1
          }
        ],
        prompt: "请帮我把这段代码里重复出现的逻辑提取成小函数。要求函数名清晰，每个函数只做一件事，并解释每个函数负责什么。"
      },
      {
        id: "objects-arrays",
        title: "对象与数组：组织一组数据",
        shortTitle: "对象与数组",
        goal: "学会表示用户、任务、订单、文章这类真实业务数据，以及它们的列表。",
        tags: ["object", "array", "map", "filter", "业务模型"],
        concepts: [
          "对象用键值对描述一个东西，比如一个用户有 name、email、role。",
          "数组用来保存一组东西，比如多个任务、多个订单、多个消息。",
          "数组常配合 map、filter、find 使用：生成新列表、筛选列表、找到某一项。",
          "生成项目之前，先写出核心对象和数组，AI 就更容易设计页面、接口和数据库。"

          <span class="lesson-status">${isLessonDone(lesson) ? "完成" : "学习中"}</span>
        `;

          state.activeIndex = index;
          state.activeTab = "concept";
          state.selectedSteps = [];
          state.scenarioAnswers = {};
          state.quizAnswers = {};

          render();
        });

      });

    function renderHeader() {
      const lesson = getLesson();
      title.textContent = lesson.title;
      goal.textContent = lesson.goal;
      breadcrumb.textContent = `第 ${state.activeIndex + 1} 课 / 共 ${lessons.length} 课`;
      tags.innerHTML = lesson.tags.map(tag => `<span class="pill">${escapeHtml(tag)}</span>`).join("");
      document.getElementById("prevLesson").disabled = state.activeIndex === 0;
      document.getElementById("nextLesson").disabled = state.activeIndex === lessons.length - 1;
      document.getElementById("markLesson").textContent = isLessonDone(lesson) ? "本课已完成" : "标记本课完成";
      mapCaption.textContent = `${lesson.shortTitle}：${lesson.goal}`;
    }

    function renderTabs() {
      document.querySelectorAll(".tab-button").forEach(button => {
        button.classList.toggle("active", button.dataset.tab === state.activeTab);
      });
    }

    function renderTabContent() {
      const lesson = getLesson();
      if (state.activeTab === "concept") {
        mark(lesson.id, "concept");
      }
      if (state.activeTab === "concept") renderConcept(lesson);
      if (state.activeTab === "example") renderExample(lesson);
      if (state.activeTab === "practice") renderPractice(lesson);
      if (state.activeTab === "quiz") renderQuiz(lesson);
      if (state.activeTab === "prompt") renderPrompt(lesson);
      if (state.activeTab === "sources") renderSources();

    function renderPractice(lesson) {

    function renderFillPractice(lesson, p) {

    function renderJsonPractice(lesson, p) {
      tabContent.innerHTML = `

    function validateJson(lessonId, shouldFormat) {
      const input = document.getElementById("jsonInput");
      const preview = document.getElementById("jsonPreview");
      try {
        const parsed = JSON.parse(input.value);
        if (shouldFormat) {
          input.value = JSON.stringify(parsed, null, 2);
        }
        preview.textContent = JSON.stringify(parsed, null, 2);
        setFeedback("JSON 合法。前后端都能稳定解析。", true);
        mark(lessonId, "practice");
      } catch (error) {
        preview.textContent = "";
        setFeedback("JSON 不合法：" + error.message, false);
      }
    }

    function drawMap() {
      const width = canvas.width;
      const height = canvas.height;
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#fbfcfb";
      ctx.fillRect(0, 0, width, height);

      const nodes = lessons.map((lesson, index) => {
        const angle = (index / lessons.length) * Math.PI * 2 - Math.PI / 2;
        const radiusX = width * 0.38;
        const radiusY = height * 0.32;
        return {
          x: width / 2 + Math.cos(angle) * radiusX,
          y: height / 2 + Math.sin(angle) * radiusY,
          lesson,
          index
        };
      });

      ctx.lineWidth = 2;
      ctx.strokeStyle = "#d9ded8";
      for (let i = 0; i < nodes.length; i += 1) {
        const current = nodes[i];
        const next = nodes[(i + 1) % nodes.length];
        ctx.beginPath();
        ctx.moveTo(current.x, current.y);
        ctx.lineTo(next.x, next.y);
        ctx.stroke();
      }

      nodes.forEach(node => {
        const active = node.index === state.activeIndex;
        const done = isLessonDone(node.lesson);
        ctx.beginPath();
        ctx.arc(node.x, node.y, active ? 16 : 12, 0, Math.PI * 2);
        ctx.fillStyle = done ? "#178760" : active ? "#2563eb" : "#ffffff";
        ctx.fill();
        ctx.lineWidth = active ? 4 : 2;
        ctx.strokeStyle = active ? "#17212b" : "#b9c2ba";
        ctx.stroke();
        ctx.fillStyle = done || active ? "#ffffff" : "#17212b";
        ctx.font = "700 12px system-ui";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(String(node.index + 1), node.x, node.y);
      });

      ctx.fillStyle = "#17212b";
      ctx.font = "800 16px system-ui";
      ctx.textAlign = "center";
      ctx.fillText("从语法到项目", width / 2, height / 2 - 8);
      ctx.fillStyle = "#65717f";
      ctx.font = "13px system-ui";
      ctx.fillText("每课完成概念、例子、练习、测验、提示词", width / 2, height / 2 + 14);
    }

    function setFeedback(message, good) {
      const feedback = document.getElementById("practiceFeedback");
      if (!feedback) return;
      feedback.textContent = message;
      feedback.className = "feedback " + (good ? "good" : "bad");
    }

    function copyPrompt(lesson) {
      if (!navigator.clipboard || !navigator.clipboard.writeText) {
        mark(lesson.id, "prompt");
        showToast("当前浏览器不支持自动复制，可以手动选中复制");
        return;
      }
      navigator.clipboard.writeText(lesson.prompt).then(() => {
        mark(lesson.id, "prompt");
        showToast("提示词已复制");
      }).catch(() => {
        showToast("浏览器不允许自动复制，可以手动选中复制");
      });
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.setTimeout(() => toast.classList.remove("show"), 1800);
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function render() {
      renderHeader();
      renderTabs();
      renderNav();
      renderProgress();
      drawMap();
      renderTabContent();
    }

    document.querySelectorAll(".tab-button").forEach(button => {
      button.addEventListener("click", () => {
        state.activeTab = button.dataset.tab;
        state.selectedSteps = [];
        state.scenarioAnswers = {};
        state.quizAnswers = {};
        saveState();
        render();
      });
    });

    document.getElementById("prevLesson").addEventListener("click", () => {
      if (state.activeIndex > 0) {
        state.activeIndex -= 1;
        state.activeTab = "concept";
        saveState();
        render();
      }
    });

    document.getElementById("nextLesson").addEventListener("click", () => {
      if (state.activeIndex < lessons.length - 1) {
        state.activeIndex += 1;
        state.activeTab = "concept";
        saveState();
        render();
      }
    });

    document.getElementById("markLesson").addEventListener("click", () => {
      const lesson = getLesson();
      ["concept", "example", "practice", "quiz", "prompt"].forEach(key => mark(lesson.id, key));
      render();
      showToast("本课已标记完成");
    });

    document.getElementById("copyPromptTop").addEventListener("click", () => {
      copyPrompt(getLesson());
    });

    document.getElementById("resetProgress").addEventListener("click", () => {
      const ok = window.confirm("确定要重置学习进度吗？");
      if (!ok) return;
      state.progress = {};
      state.activeIndex = 0;
      state.activeTab = "concept";
      saveState();
      render();
      showToast("进度已重置");
    });

    render();
